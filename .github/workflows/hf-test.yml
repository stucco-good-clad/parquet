name: hf-test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-hf-bucket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install huggingface_hub
        run: pip install "huggingface_hub[cli]"

      - name: Login to HF
        env:
          HF_TOKEN: ${{ secrets.TOKEN }}
        run: huggingface-cli login --token "$HF_TOKEN"

      - name: List files in bucket
        run: hf buckets ls stucco-good-clad/zlib-storage

      - name: Show bucket info
        run: hf buckets info stucco-good-clad/zlib-storage
