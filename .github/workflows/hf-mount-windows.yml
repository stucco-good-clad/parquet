name: Mount HF Bucket (Windows)

on:
  push:
    branches: ["*"]
  workflow_dispatch:

env:
  HF_BUCKET: ${{ vars.HF_BUCKET }}

jobs:
  mount:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup hf CLI
        run: |
          pip install huggingface_hub
          hf --version
          hf auth login --token "${{ secrets.HF_TOKEN }}"

      - name: List bucket contents
        run: |
          Write-Host "=== Bucket: $env:HF_BUCKET ==="
          hf buckets ls $env:HF_BUCKET

      - name: Upload test file
        run: |
          "Hello from GitHub Actions $(Get-Date)" | Out-File -FilePath "test-upload.txt" -Encoding utf8
          Write-Host "Uploading test file..."
          hf buckets cp test-upload.txt "hf://buckets/$env:HF_BUCKET/test-upload.txt"
          Write-Host "`n=== Bucket after upload ==="
          hf buckets ls $env:HF_BUCKET

      - name: Download and verify
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          New-Item -ItemType Directory -Force -Path "downloaded" | Out-Null
          hf buckets cp "hf://buckets/$env:HF_BUCKET/test-upload.txt" "downloaded/test-upload.txt" 2>&1 | Out-Null
          Write-Host "Downloaded file:"
          Get-Content "downloaded/test-upload.txt"
