name: Mount HF Bucket (Windows)

on:
  workflow_dispatch:

env:
  HF_BUCKET: ${{ vars.HF_BUCKET }}

jobs:
  mount:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install WSL2 + Ubuntu
        shell: pwsh
        run: |
          $distros = wsl -l -v 2>&1
          $hasUbuntu = $distros -match "Ubuntu"
          
          if (-not $hasUbuntu) {
            Write-Host "Installing Ubuntu..."
            wsl --install -d Ubuntu --no-launch
            Start-Sleep -Seconds 30
            wsl --shutdown
            Start-Sleep -Seconds 5
          }

          Write-Host "=== Installed distros ==="
          wsl -l -v 2>&1

      - name: Setup hf-mount in Ubuntu
        shell: pwsh
        run: |
          wsl -d Ubuntu -u root -- bash -c "apt-get update -qq && apt-get install -y -qq nfs-common curl 2>&1 | tail -3"
          wsl -d Ubuntu -- bash -c "curl -sL https://github.com/huggingface/hf-mount/releases/latest/download/hf-mount-nfs-x86_64-linux -o /usr/local/bin/hf-mount-nfs && chmod +x /usr/local/bin/hf-mount-nfs && hf-mount-nfs --version"

      - name: Mount bucket (detached)
        shell: pwsh
        run: |
          $token = "${{ secrets.HF_TOKEN }}"
          $bucket = "${{ vars.HF_BUCKET }}"
          
          # Start-Process launches WSL fully detached from PowerShell
          Start-Process -FilePath "wsl" -ArgumentList @("-d", "Ubuntu", "--", "bash", "-c", "export PYTHONIOENCODING=utf-8; mkdir -p /hf-drive; nohup hf-mount-nfs --hf-token '$token' bucket '$bucket' /hf-drive > /tmp/hf-mount.log 2>&1 &")
          
          Write-Host "Waiting 15s for mount..."
          Start-Sleep -Seconds 15
          
          Write-Host "=== Mount log ==="
          wsl -d Ubuntu -- cat /tmp/hf-mount.log 2>&1

      - name: Test mount
        shell: pwsh
        run: |
          Write-Host "=== Mount status ==="
          wsl -d Ubuntu -- mount | grep hf-drive
          
          Write-Host "`n=== Write test ==="
          wsl -d Ubuntu -- bash -c "echo test > /hf-drive/_test.txt && echo WRITE_OK || echo WRITE_FAILED"
          
          Write-Host "`n=== Read test ==="
          wsl -d Ubuntu -- bash -c "cat /hf-drive/_test.txt 2>&1"
          
          wsl -d Ubuntu -- bash -c "rm -f /hf-drive/_test.txt"

      - name: Verify mount persists
        shell: pwsh
        run: |
          Write-Host "=== Is mount still alive after previous step? ==="
          wsl -d Ubuntu -- bash -c "mount | grep hf-drive && echo MOUNT_ALIVE || echo MOUNT_DEAD"

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          wsl -d Ubuntu -- bash -c "pkill -f hf-mount-nfs" 2>$null
          try { wsl --shutdown } catch {}
