name: Mount HF Bucket (Windows)

on:
  push:
    branches: ["*"]
  workflow_dispatch:

env:
  HF_BUCKET: ${{ vars.HF_BUCKET }}

jobs:
  mount:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install WSL2 + Ubuntu
        shell: pwsh
        run: |
          Write-Host "=== Current distros ==="
          wsl -l -v 2>&1

          $distros = wsl -l -v 2>&1
          $hasUbuntu = $distros -match "Ubuntu"
          
          if (-not $hasUbuntu) {
            Write-Host "Installing Ubuntu..."
            wsl --install -d Ubuntu --no-launch
            Start-Sleep -Seconds 30
            wsl --shutdown
            Start-Sleep -Seconds 5
          }

          Write-Host "=== Installed distros ==="
          wsl -l -v 2>&1

      - name: Setup hf-mount in Ubuntu
        shell: pwsh
        run: |
          Write-Host "=== Installing deps ==="
          wsl -d Ubuntu -u root -- bash -c "apt-get update -qq && apt-get install -y -qq nfs-common curl 2>&1 | tail -3"
          
          Write-Host "`n=== Downloading hf-mount-nfs ==="
          wsl -d Ubuntu -- bash -c "curl -sL https://github.com/huggingface/hf-mount/releases/latest/download/hf-mount-nfs-x86_64-linux -o /usr/local/bin/hf-mount-nfs && chmod +x /usr/local/bin/hf-mount-nfs && hf-mount-nfs --version"

      - name: Mount bucket
        shell: pwsh
        run: |
          wsl -d Ubuntu -u root -- bash -c "mkdir -p /hf-drive"
          
          $token = "${{ secrets.HF_TOKEN }}"
          $bucket = "${{ vars.HF_BUCKET }}"
          
          Write-Host "Starting hf-mount for bucket: $bucket"
          
          # Start hf-mount in background via WSL
          $job = Start-Job -ScriptBlock {
            param($t, $b)
            wsl -d Ubuntu -- bash -c "export PYTHONIOENCODING=utf-8; hf-mount-nfs --hf-token '$t' bucket '$b' /hf-drive 2>&1"
          } -ArgumentList $token, $bucket
          
          # Wait for NFS server to start
          Start-Sleep -Seconds 15
          
          # Quick check if mount point is usable (with timeout)
          Write-Host "=== Testing mount with stat ==="
          wsl -d Ubuntu -- bash -c "timeout 10 stat /hf-drive 2>&1"
          
          Write-Host "`n=== Testing with ls (timeout 30s) ==="
          wsl -d Ubuntu -- bash -c "timeout 30 ls -la /hf-drive/ 2>&1" | Select-Object -First 10
          
          Write-Host "`n=== Job status ==="
          Write-Host "State: $($job.State)"
          $output = $job | Receive-Job -ErrorAction SilentlyContinue
          if ($output) { Write-Host "Output: $output" }

      - name: Check access (WSL only)
        shell: pwsh
        run: |
          Write-Host "=== Testing mount via WSL ==="
          # Write from WSL
          wsl -d Ubuntu -- bash -c "echo 'Written from WSL at $(date)' > /hf-drive/_test_wsl.txt"
          Write-Host "Wrote file from WSL"
          # Read back
          Write-Host "`nReading back:"
          wsl -d Ubuntu -- bash -c "cat /hf-drive/_test_wsl.txt 2>&1"
          # Cleanup
          wsl -d Ubuntu -- bash -c "rm -f /hf-drive/_test_wsl.txt"
          Write-Host "`nMount is working! Files can be read/written at /hf-drive inside WSL."

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Write-Host "Stopping mount jobs..."
          Get-Job | Stop-Job -PassThru | Remove-Job -Force -ErrorAction SilentlyContinue
          try { wsl --shutdown } catch {}
