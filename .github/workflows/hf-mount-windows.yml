name: Mount HF Bucket (Windows)

on:
  push:
    branches: ["*"]
  workflow_dispatch:

env:
  HF_BUCKET: ${{ vars.HF_BUCKET }}

jobs:
  mount:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup WSL + hf-mount
        run: |
          # Install nfs-common in WSL (for mount.nfs)
          wsl -u root -- bash -c "apt-get update && apt-get install -y nfs-common curl"
          # Download hf-mount NFS binary into WSL
          wsl -- bash -c "curl -sL https://github.com/huggingface/hf-mount/releases/latest/download/hf-mount-nfs-x86_64-linux -o /usr/local/bin/hf-mount-nfs && chmod +x /usr/local/bin/hf-mount-nfs && hf-mount-nfs --version"

      - name: Mount bucket via WSL
        run: |
          # Create mount point inside WSL
          wsl -u root -- bash -c "mkdir -p /hf-drive && chown runner:runner /hf-drive"
          # Start hf-mount in background inside WSL
          wsl -- bash -c "hf-mount-nfs --hf-token '${{ secrets.HF_TOKEN }}' bucket '${{ vars.HF_BUCKET }}' /hf-drive &"
          Start-Sleep -Seconds 8
          # Verify mount from Windows side
          Write-Host "=== Bucket via WSL ==="
          wsl -- ls -la /hf-drive/

      - name: Access from Windows
        run: |
          # WSL paths are accessible from Windows via \\wsl$\Ubuntu\
          Write-Host "=== Accessing bucket from Windows ==="
          Get-ChildItem "\\wsl$\Ubuntu\hf-drive" -Force -ErrorAction SilentlyContinue
          Write-Host ""
          Write-Host "=== WSL mount status ==="
          wsl -- df -h /hf-drive
