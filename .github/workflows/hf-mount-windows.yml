name: Mount HF Bucket (Windows)

on:
  push:
    branches: ["*"]
  workflow_dispatch:

env:
  HF_BUCKET: ${{ vars.HF_BUCKET }}

jobs:
  mount:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install WSL2 + Ubuntu
        shell: pwsh
        run: |
          $distros = wsl -l -v 2>&1
          $hasUbuntu = $distros -match "Ubuntu"
          
          if (-not $hasUbuntu) {
            Write-Host "Installing Ubuntu..."
            wsl --install -d Ubuntu --no-launch
            Start-Sleep -Seconds 30
            wsl --shutdown
            Start-Sleep -Seconds 5
          }

          Write-Host "=== Installed distros ==="
          wsl -l -v 2>&1

      - name: Setup hf-mount in Ubuntu
        shell: pwsh
        run: |
          wsl -d Ubuntu -u root -- bash -c "apt-get update -qq && apt-get install -y -qq nfs-common curl 2>&1 | tail -3"
          wsl -d Ubuntu -- bash -c "curl -sL https://github.com/huggingface/hf-mount/releases/latest/download/hf-mount-nfs-x86_64-linux -o /usr/local/bin/hf-mount-nfs && chmod +x /usr/local/bin/hf-mount-nfs && hf-mount-nfs --version"

      - name: Mount and test
        shell: pwsh
        run: |
          $token = "${{ secrets.HF_TOKEN }}"
          $bucket = "${{ vars.HF_BUCKET }}"
          $bashScript = 'export PYTHONIOENCODING=utf-8' + "`n"
          $bashScript += 'mkdir -p /hf-drive' + "`n"
          $bashScript += 'echo Starting hf-mount...' + "`n"
          $bashScript += "nohup hf-mount-nfs --hf-token '$token' bucket '$bucket' /hf-drive > /tmp/hf-mount.log 2>&1 &" + "`n"
          $bashScript += 'MOUNT_PID=$!' + "`n"
          $bashScript += 'echo Mount PID: $MOUNT_PID' + "`n"
          $bashScript += 'sleep 15' + "`n"
          $bashScript += 'cat /tmp/hf-mount.log' + "`n"
          $bashScript += 'mount | grep hf-drive || echo NOT MOUNTED' + "`n"
          $bashScript += 'timeout 15 sh -c "echo test > /hf-drive/_test.txt && echo WRITE_OK || echo WRITE_FAILED"' + "`n"
          $bashScript += 'timeout 15 cat /hf-drive/_test.txt 2>&1 || echo READ_FAILED' + "`n"
          $bashScript += 'rm -f /hf-drive/_test.txt 2>/dev/null' + "`n"
          $bashScript += 'kill -0 $MOUNT_PID 2>/dev/null && echo MOUNT_ALIVE || echo MOUNT_DEAD' + "`n"
          
          wsl -d Ubuntu -- bash -c $bashScript

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          wsl -d Ubuntu -- bash -c "pkill -f hf-mount-nfs" 2>$null
          try { wsl --shutdown } catch {}
