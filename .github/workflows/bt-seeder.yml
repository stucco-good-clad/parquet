name: BT Seeder

on:
  workflow_dispatch:
    inputs:
      run_minutes:
        description: 'Minutes to run (max 55)'
        required: false
        default: '55'

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Run seeder
        env:
          RUN_MINUTES: ${{ github.event.inputs.run_minutes || '55' }}
          TORRENT_FILE: r_3620000.torrent
        run: python3 raw_seeder.py
