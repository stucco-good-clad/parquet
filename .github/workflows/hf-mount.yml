name: Mount HF Bucket

on:
  push:
    branches: ["*"]
  workflow_dispatch:

env:
  HF_BUCKET: ${{ vars.HF_BUCKET }}

jobs:
  mount:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hf-mount
        run: |
          curl -sL https://github.com/huggingface/hf-mount/releases/latest/download/hf-mount-nfs-x86_64-linux -o /usr/local/bin/hf-mount-nfs
          chmod +x /usr/local/bin/hf-mount-nfs
          hf-mount-nfs --version

      - name: Mount bucket
        run: |
          sudo mkdir -p /hf-drive
          sudo chown runner:runner /hf-drive
          hf-mount-nfs \
            --hf-token "${{ secrets.HF_TOKEN }}" \
            bucket "${{ vars.HF_BUCKET }}" \
            /hf-drive &
          sleep 5
          echo "Mount status:"
          ls -la /hf-drive/

      - name: Verify mount
        run: |
          echo "=== Bucket contents ==="
          ls -la /hf-drive/ || echo "(empty or mount failed)"
          echo ""
          echo "=== hf-mount logs ==="
          cat ~/.hf-mount/logs/*.log 2>/dev/null || echo "(no logs)"
