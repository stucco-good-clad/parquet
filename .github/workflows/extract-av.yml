name: Extract AV

on:
  push:
    branches: ["*"]
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y unrar aria2 tree

      - name: Download RAR parts (parallel)
        run: |
          mkdir -p download
          aria2c -x 16 -s 16 -j 5 -d download -o "AV.part1.rar" \
            "https://github.com/stucco-good-clad/parquet/releases/download/av/AV.part1.rar" &
          aria2c -x 16 -s 16 -j 5 -d download -o "AV.part2.rar" \
            "https://github.com/stucco-good-clad/parquet/releases/download/av/AV.part2.rar" &
          aria2c -x 16 -s 16 -j 5 -d download -o "AV.part3.rar" \
            "https://github.com/stucco-good-clad/parquet/releases/download/av/AV.part3.rar" &
          aria2c -x 16 -s 16 -j 5 -d download -o "AV.part4.rar" \
            "https://github.com/stucco-good-clad/parquet/releases/download/av/AV.part4.rar" &
          aria2c -x 16 -s 16 -j 5 -d download -o "AV.part5.rar" \
            "https://github.com/stucco-good-clad/parquet/releases/download/av/AV.part5.rar" &
          wait
          echo "All parts downloaded."
          ls -lh download/

      - name: Extract and merge
        run: |
          mkdir -p extracted
          unrar x -o+ download/AV.part1.rar extracted/

      - name: Show tree
        run: tree -a extracted/

      - name: Upload setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: setup
          path: extracted/setup.exe
