name: Install AV

on:
  push:
    branches: ["*"]
  workflow_dispatch:

jobs:
  install-and-upload:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          Write-Host "Installing aria2 and unrar via Chocolatey..."
          choco install aria2 unrar -y
          Write-Host "Tools installed."
          aria2c --version
          unrar | Select-Object -First 3

      - name: Download RAR parts (parallel)
        run: |
          $dl = "$env:TEMP\dl"
          New-Item -ItemType Directory -Force -Path $dl | Out-Null
          $base = "https://github.com/stucco-good-clad/parquet/releases/download/av"
          Write-Host "Downloading 5 RAR parts in parallel (16 connections each)..."
          $jobs = @()
          1..5 | ForEach-Object {
            $i = $_
            $jobs += Start-Job -ScriptBlock {
              param($i, $base, $dl)
              & aria2c -x 16 -s 16 -j 5 -d $dl -o "AV.part${i}.rar" "$base/AV.part${i}.rar" 2>&1
            } -ArgumentList $i, $base, $dl
          }
          $jobs | Wait-Job | Receive-Job
          $jobs | Remove-Job -Force
          Write-Host "`nAll parts downloaded."
          Get-ChildItem $dl | ForEach-Object { Write-Host "  $($_.Name) - $([math]::Round($_.Length/1MB, 2)) MB" }

      - name: Extract RAR parts
        run: |
          $dl = "$env:TEMP\dl"
          $extracted = "$env:TEMP\extracted"
          New-Item -ItemType Directory -Force -Path $extracted | Out-Null
          Write-Host "Extracting RAR parts to $extracted..."
          unrar x -o+ "$dl\AV.part1.rar" "$extracted\"
          Write-Host "`nExtracted files:"
          Get-ChildItem $extracted | ForEach-Object { Write-Host "  $($_.Name) - $([math]::Round($_.Length/1MB, 2)) MB" }

      - name: Backup hosts file
        run: |
          $hosts = "$env:SystemRoot\System32\drivers\etc\hosts"
          Copy-Item $hosts "$hosts.bak" -Force
          Write-Host "Hosts file backed up to $hosts.bak"

      - name: Install game
        run: |
          $extracted = "$env:TEMP\extracted"
          $logFile = "C:\install.log"
          $setupExe = "$extracted\setup.exe"

          Write-Host "=== Starting installer ==="
          Write-Host "Setup: $setupExe"
          Write-Host "Log: $logFile"
          Write-Host "Install dir: C:\game"
          Write-Host ""

          # Start installer with logging in background
          $proc = Start-Process -PassThru -FilePath $setupExe -ArgumentList @(
            "/SILENT",
            "/DIR=C:\game",
            "/NORESTART",
            "/CLOSEAPPLICATIONS",
            "/FORCECLOSEAPPLICATIONS",
            "/LOG=`"$logFile`""
          )

          Write-Host "Installer started (PID: $($proc.Id))"
          Write-Host "Monitoring install log...`n"

          # Poll log file for new lines while installer runs
          # Sequence: files copied -> "succeeded" -> ISDone decompresses (~8min) -> QuickSFV hangs
          $lastLine = 0
          $qsfvKilled = $false
          while (!$proc.HasExited) {
              Start-Sleep -Seconds 10
              if (Test-Path $logFile) {
                  $lines = Get-Content $logFile
                  if ($lines.Count -gt $lastLine) {
                      $lines[$lastLine..($lines.Count - 1)] | ForEach-Object { Write-Host "  $_" }
                      $lastLine = $lines.Count
                  }
              }
              # Kill entire setup.exe tree when QuickSFV spawns (decompression done)
              $qsfv = Get-Process -Name "QuickSFV" -ErrorAction SilentlyContinue
              if ($qsfv -and !$qsfvKilled) {
                  Write-Host "`n  [!] QuickSFV appeared (decompression done) — killing installer tree..."
                  Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
                  $qsfvKilled = $true
              }
              # Show disk usage of install dir
              if (Test-Path "C:\game") {
                  $size = (Get-ChildItem "C:\game" -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB
                  Write-Host "  [disk] C:\game = $([math]::Round($size, 1)) MB"
              }
          }

          # Final log dump
          if (Test-Path $logFile) {
              $lines = Get-Content $logFile
              if ($lines.Count -gt $lastLine) {
                  $lines[$lastLine..($lines.Count - 1)] | ForEach-Object { Write-Host "  $_" }
              }
          }

          Write-Host "`n=== Installer finished (exit code: $($proc.ExitCode)) ==="
          if (Test-Path "C:\game") {
              $size = (Get-ChildItem "C:\game" -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB
              Write-Host "Install dir size: $([math]::Round($size, 1)) MB"
          } else {
              Write-Host "WARNING: C:\game does not exist!"
          }

      - name: Restore hosts file (remove malware)
        run: |
          $hosts = "$env:SystemRoot\System32\drivers\etc\hosts"
          $bak = "$hosts.bak"
          if (Test-Path $bak) {
            Copy-Item $bak $hosts -Force
            Remove-Item $bak -Force
            Write-Host "Hosts file restored (malware entries removed)."
          }

      - name: Show installed content
        run: |
          Write-Host "`n=== Installed files ==="
          if (Get-Command tree -ErrorAction SilentlyContinue) {
            tree C:\game /A
          } else {
            Get-ChildItem C:\game -Recurse | ForEach-Object {
              $indent = "  " * ($_.FullName.Split('\').Count - "C:\game".Split('\').Count)
              Write-Host "$indent$($_.Name)"
            }
          }

      - name: Zip installed content
        run: |
          Write-Host "`n=== Zipping installed content ==="
          $zip = "$env:TEMP\game.zip"
          # Use tar (fast) instead of Compress-Archive (slow)
          tar -cf $zip --format=zip -C C:\game .
          $size = (Get-Item $zip).Length / 1MB
          Write-Host "Zipped: $([math]::Round($size, 2)) MB -> $zip"

      - name: Upload to bzzhr.co
        run: |
          $zip = "$env:TEMP\game.zip"
          $size = (Get-Item $zip).Length / 1MB
          Write-Host "`n=== Uploading to bzzhr.co ==="
          Write-Host "File: $zip"
          Write-Host "Size: $([math]::Round($size, 2)) MB"
          Write-Host "Uploading..."
          $response = curl -#o - -T $zip "https://w.bzzhr.co/AV.Director.Life.zip" 2>&1
          Write-Host $response
          Write-Host "`nDownload URL: https://bzzhr.co/AV.Director.Life.zip"
