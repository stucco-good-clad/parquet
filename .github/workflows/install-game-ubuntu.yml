name: Install Game (Ubuntu + Windows Container)

on:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unrar p7zip-full curl nfs-common

      - name: Install hf-mount
        run: |
          curl -sL https://github.com/huggingface/hf-mount/releases/latest/download/hf-mount-nfs-x86_64-linux -o /usr/local/bin/hf-mount-nfs
          chmod +x /usr/local/bin/hf-mount-nfs
          hf-mount-nfs --version

      - name: Mount HF bucket
        run: |
          sudo mkdir -p /hf-drive
          sudo chown runner:runner /hf-drive
          hf-mount-nfs \
            --hf-token "${{ secrets.HF_TOKEN }}" \
            bucket "${{ vars.HF_BUCKET }}" \
            /hf-drive &
          sleep 5
          echo "Mount status:"
          ls -la /hf-drive/

      - name: Download parts to bucket
        run: |
          BASE="https://github.com/stucco-good-clad/parquet/releases/download/av"
          mkdir -p /hf-drive/AV/parts
          for i in 1 2 3 4 5; do
            echo "Downloading AV.part${i}.rar..."
            curl -L -o "/hf-drive/AV/parts/AV.part${i}.rar" "$BASE/AV.part${i}.rar"
            echo "Done part $i"
          done
          echo "=== Downloaded ==="
          ls -lh /hf-drive/AV/parts/

      - name: Extract
        run: |
          echo "Extracting from parts..."
          unrar x -o+ /hf-drive/AV/parts/AV.part1.rar /hf-drive/AV/extracted/
          echo "=== Extracted ==="
          ls -lh /hf-drive/AV/extracted/

      - name: Delete parts
        run: |
          echo "Deleting parts from bucket..."
          rm -rf /hf-drive/AV/parts
          echo "=== Remaining ==="
          ls -lh /hf-drive/AV/

      - name: Enable Windows containers
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker info | grep -i "execution driver\|Architecture\|OSType"

      - name: Install game via Windows Server container
        run: |
          echo "=== Starting Windows Server container with shared bucket ==="
          docker run -d \
            --name win-install \
            --platform windows/amd64 \
            -v /hf-drive:/hf-drive \
            mcr.microsoft.com/windows/servercore:ltsc2022 \
            powershell.exe -Command "while($true){Start-Sleep -Seconds 60}"

          echo "Waiting for container to be ready..."
          sleep 30

          # Find setup.exe
          SETUP=$(docker exec win-install powershell.exe -Command "Get-ChildItem -Path 'Z:\hf-drive\AV\extracted' -Filter 'setup.exe' -Recurse | Select-Object -First 1 -ExpandProperty FullName" 2>/dev/null | tr -d '\r')
          echo "Setup found: $SETUP"

          if [ -z "$SETUP" ]; then
            echo "ERROR: setup.exe not found!"
            docker exec win-install powershell.exe -Command "Get-ChildItem -Path 'Z:\hf-drive\AV\extracted' -Recurse | Select-Object FullName"
            exit 1
          fi

          # Create install dir
          docker exec win-install powershell.exe -Command "New-Item -ItemType Directory -Force -Path 'Z:\hf-drive\AV\installed'"

          # Run installer
          echo "Launching installer..."
          docker exec -d win-install powershell.exe -Command "
            Start-Process -FilePath '$SETUP' -ArgumentList '/SILENT','/DIR=Z:\hf-drive\AV\installed','/NORESTART','/CLOSEAPPLICATIONS','/FORCECLOSEAPPLICATIONS','/LOG=Z:\hf-drive\AV\install.log' -Wait
          "

          echo "Installer launched. Monitoring..."

          # Monitor
          for i in $(seq 1 180); do
            sleep 10

            # Check for QuickSFV
            if docker exec win-install powershell.exe -Command "Get-Process -Name 'QuickSFV' -ErrorAction SilentlyContinue" 2>/dev/null | grep -q "QuickSFV"; then
              echo "[!] QuickSFV detected — killing installer"
              docker exec win-install powershell.exe -Command "Stop-Process -Name 'setup' -Force -ErrorAction SilentlyContinue; Stop-Process -Name 'QuickSFV' -Force -ErrorAction SilentlyContinue" 2>/dev/null
              break
            fi

            # Show install dir size
            if [ -d /hf-drive/AV/installed ]; then
              SIZE=$(du -sh /hf-drive/AV/installed 2>/dev/null | cut -f1)
              echo "  [disk] installed = $SIZE"
            fi

            # Check log
            if [ -f /hf-drive/AV/install.log ]; then
              tail -1 /hf-drive/AV/install.log 2>/dev/null
            fi
          done

          echo "=== Install step complete ==="
          docker exec win-install powershell.exe -Command "Get-ChildItem -Path 'Z:\hf-drive\AV\installed' | Select-Object Name,Length" 2>/dev/null | head -20

      - name: Stop container
        if: always()
        run: |
          docker stop win-install 2>/dev/null || true
          docker rm win-install 2>/dev/null || true

      - name: Zip installed game
        run: |
          echo "=== Zipping ==="
          tar -czf /hf-drive/AV/AV.Director.Life.tar.gz -C /hf-drive/AV/installed .
          ls -lh /hf-drive/AV/AV.Director.Life.tar.gz

      - name: Upload to bzzhr.co
        run: |
          FILE="/hf-drive/AV/AV.Director.Life.tar.gz"
          SIZE=$(ls -lh "$FILE" | awk '{print $5}')
          echo "=== Uploading $SIZE ==="
          RESPONSE=$(curl -T "$FILE" "https://w.bzzhr.co/AV.Director.Life.tar.gz" 2>&1)
          echo "$RESPONSE"

      - name: Cleanup
        if: always()
        run: |
          docker rm -f win-install 2>/dev/null || true
          pkill -f hf-mount-nfs 2>/dev/null || true
