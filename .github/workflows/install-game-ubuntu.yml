name: Install Game (Ubuntu + Docker)

on:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unrar p7zip-full aria2 curl

      - name: Install hf-mount
        run: |
          curl -sL https://github.com/huggingface/hf-mount/releases/latest/download/hf-mount-nfs-x86_64-linux -o /usr/local/bin/hf-mount-nfs
          chmod +x /usr/local/bin/hf-mount-nfs
          hf-mount-nfs --version

      - name: Mount HF bucket
        run: |
          sudo mkdir -p /hf-drive
          sudo chown runner:runner /hf-drive
          hf-mount-nfs \
            --hf-token "${{ secrets.HF_TOKEN }}" \
            bucket "${{ vars.HF_BUCKET }}" \
            /hf-drive &
          sleep 5
          echo "Mount status:"
          ls -la /hf-drive/

      - name: Download parts to bucket
        run: |
          BASE="https://github.com/stucco-good-clad/parquet/releases/download/av"
          mkdir -p /hf-drive/AV/parts
          echo "Downloading RAR parts..."
          aria2c -x 16 -s 16 -j 5 -d /hf-drive/AV/parts \
            "$BASE/AV.part1.rar" \
            "$BASE/AV.part2.rar" \
            "$BASE/AV.part3.rar" \
            "$BASE/AV.part4.rar" \
            "$BASE/AV.part5.rar"
          echo "=== Downloaded ==="
          ls -lh /hf-drive/AV/parts/

      - name: Merge parts
        run: |
          echo "Merging parts..."
          cat /hf-drive/AV/parts/AV.part{1,2,3,4,5}.rar > /hf-drive/AV/merged.rar
          ls -lh /hf-drive/AV/merged.rar

      - name: Extract
        run: |
          echo "Extracting..."
          unrar x -o+ /hf-drive/AV/merged.rar /hf-drive/AV/extracted/
          echo "=== Extracted ==="
          ls -lh /hf-drive/AV/extracted/

      - name: Delete parts and merged zip
        run: |
          echo "Deleting parts and merged file..."
          rm -rf /hf-drive/AV/parts
          rm -f /hf-drive/AV/merged.rar
          echo "=== Remaining ==="
          ls -lh /hf-drive/AV/

      - name: Pull Wine Docker image
        run: |
          echo "Pulling Wine Docker image..."
          docker pull scottyhardy/docker-wine:latest

      - name: Install game via Docker
        run: |
          echo "=== Starting Wine container with shared bucket ==="
          docker run -d \
            --name wine-install \
            -v /hf-drive:/hf-drive \
            scottyhardy/docker-wine:latest \
            tail -f /dev/null

          echo "Container started. Waiting for Wine to initialize..."
          docker exec wine-install wine wineboot --init 2>&1 | tail -5

          SETUP=$(docker exec wine-install find /hf-drive/AV/extracted -name "setup.exe" -type f 2>/dev/null | head -1)
          echo "Setup found: $SETUP"

          if [ -z "$SETUP" ]; then
            echo "ERROR: setup.exe not found!"
            docker exec wine-install ls -lhR /hf-drive/AV/extracted/
            exit 1
          fi

          # Convert Linux path to Wine Z: path
          SETUP_WIN=$(docker exec wine-install wine winepath -w "$SETUP" 2>/dev/null || echo "Z:\\hf-drive\\AV\\extracted\\setup.exe")
          INSTALL_WIN="Z:\\hf-drive\\AV\\installed"
          mkdir -p /hf-drive/AV/installed

          echo "Setup (Windows path): $SETUP_WIN"
          echo "Install dir (Windows path): $INSTALL_WIN"

          # Run installer in background inside container
          docker exec -d wine-install bash -c "
            export DISPLAY=:0
            wine '$SETUP_WIN' /DIR='$INSTALL_WIN' /SILENT /NORESTART /CLOSEAPPLICATIONS /FORCECLOSEAPPLICATIONS /LOG='Z:\\hf-drive\\AV\\install.log' 2>&1
          &"

          echo "Installer launched. Monitoring..."

          # Monitor: check for QuickSFV and log
          KILLED=0
          for i in $(seq 1 180); do
            sleep 10

            # Check for QuickSFV
            if docker exec wine-install bash -c "tasklist 2>/dev/null | grep -qi quicksfv" 2>/dev/null; then
              echo "[!] QuickSFV detected — killing installer"
              docker exec wine-install bash -c "taskkill /F /IM setup.exe 2>/dev/null; taskkill /F /IM QuickSFV.exe 2>/dev/null" 2>/dev/null
              KILLED=1
              break
            fi

            # Show log tail
            if [ -f /hf-drive/AV/install.log ]; then
              tail -1 /hf-drive/AV/install.log 2>/dev/null
            fi

            # Show install dir size
            if [ -d /hf-drive/AV/installed ]; then
              echo "  [disk] installed = $(du -sh /hf-drive/AV/installed 2>/dev/null | cut -f1)"
            fi

            # Check if installer exited
            RUNNING=$(docker exec wine-install bash -c "tasklist 2>/dev/null | grep -qi setup.exe && echo yes || echo no" 2>/dev/null)
            if [ "$RUNNING" = "no" ] && [ "$KILLED" -eq 0 ]; then
              echo "Installer exited naturally."
              break
            fi
          done

          echo "=== Install step complete ==="
          docker exec wine-install ls -lh /hf-drive/AV/installed/ 2>/dev/null | head -20

      - name: Stop container
        if: always()
        run: |
          docker stop wine-install 2>/dev/null || true
          docker rm wine-install 2>/dev/null || true

      - name: Zip installed game
        run: |
          echo "=== Zipping ==="
          tar -czf /hf-drive/AV/AV.Director.Life.tar.gz -C /hf-drive/AV/installed .
          ls -lh /hf-drive/AV/AV.Director.Life.tar.gz

      - name: Upload to bzzhr.co
        run: |
          FILE="/hf-drive/AV/AV.Director.Life.tar.gz"
          SIZE=$(ls -lh "$FILE" | awk '{print $5}')
          echo "=== Uploading $SIZE ==="
          RESPONSE=$(curl -T "$FILE" "https://w.bzzhr.co/AV.Director.Life.tar.gz" 2>&1)
          echo "$RESPONSE"

      - name: Cleanup
        if: always()
        run: |
          docker rm -f wine-install 2>/dev/null || true
          pkill -f hf-mount-nfs 2>/dev/null || true
