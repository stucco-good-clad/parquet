name: Install Game (Ubuntu + Wine-GE)

on:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            unrar curl nfs-common \
            wine64 wine32 winetricks \
            xvfb x11-utils

      - name: Install hf-mount
        run: |
          curl -sL https://github.com/huggingface/hf-mount/releases/latest/download/hf-mount-nfs-x86_64-linux -o /usr/local/bin/hf-mount-nfs
          chmod +x /usr/local/bin/hf-mount-nfs
          hf-mount-nfs --version

      - name: Mount HF bucket
        run: |
          sudo mkdir -p /hf-drive
          sudo chown runner:runner /hf-drive
          hf-mount-nfs \
            --hf-token "${{ secrets.HF_TOKEN }}" \
            bucket "${{ vars.HF_BUCKET }}" \
            /hf-drive &
          sleep 5
          ls -la /hf-drive/

      - name: Download parts to bucket
        run: |
          BASE="https://github.com/stucco-good-clad/parquet/releases/download/av"
          mkdir -p /hf-drive/AV/parts
          for i in 1 2 3 4 5; do
            echo "Downloading AV.part${i}.rar..."
            curl -L -o "/hf-drive/AV/parts/AV.part${i}.rar" "$BASE/AV.part${i}.rar"
            echo "Done part $i"
          done
          ls -lh /hf-drive/AV/parts/

      - name: Extract
        run: |
          unrar x -o+ /hf-drive/AV/parts/AV.part1.rar /hf-drive/AV/extracted/
          ls -lh /hf-drive/AV/extracted/

      - name: Delete parts
        run: |
          rm -rf /hf-drive/AV/parts
          ls -lh /hf-drive/AV/

      - name: Install Wine-GE
        run: |
          # Download Wine-GE (latest non-lol version)
          WINE_GE_URL="https://github.com/GloriousEggroll/wine-ge-custom/releases/download/GE-Proton8-26/Wine_GE_8.26-x86_64.tar.xz"
          echo "Downloading Wine-GE..."
          curl -L -o /tmp/wine-ge.tar.xz "$WINE_GE_URL"
          mkdir -p ~/wine-ge
          tar -xf /tmp/wine-ge.tar.xz -C ~/wine-ge --strip-components=1
          rm /tmp/wine-ge.tar.xz
          echo "Wine-GE installed:"
          ~/wine-ge/bin/wine --version 2>/dev/null || echo "Version check failed"

      - name: Create Wine prefix and install game
        run: |
          export WINEPREFIX=/tmp/wineprefix
          export WINEARCH=win64
          export WINEDLLOVERRIDES="winemenubuilder.exe=d"
          WINE=~/wine-ge/bin/wine

          echo "=== Initializing Wine prefix ==="
          WINEDEBUG=-all $WINE wineboot --init 2>&1 | tail -5

          SETUP=$(find /hf-drive/AV/extracted -name "setup.exe" -type f 2>/dev/null | head -1)
          echo "Setup found: $SETUP"

          if [ -z "$SETUP" ]; then
            echo "ERROR: setup.exe not found!"
            ls -lhR /hf-drive/AV/extracted/
            exit 1
          fi

          # Create install dir
          mkdir -p /hf-drive/AV/installed

          echo "=== Starting installer ==="
          echo "Setup: $SETUP"
          echo "Install to: Z:\AV\installed"

          # Run installer with Wine-GE under Xvfb
          xvfb-run -a -s "-screen 0 1024x768x24" \
            $WINE "$SETUP" \
            /DIR="Z:\\AV\\installed" \
            /SILENT \
            /NORESTART \
            /CLOSEAPPLICATIONS \
            /FORCECLOSEAPPLICATIONS \
            /LOG="Z:\\AV\\install.log" \
            2>&1 &
          INSTALLER_PID=$!
          echo "Installer PID: $INSTALLER_PID"

          echo "=== Monitoring ==="
          for i in $(seq 1 180); do
            sleep 10

            # Check for QuickSFV
            if pgrep -f "QuickSFV" > /dev/null 2>&1; then
              echo "[!] QuickSFV detected — killing installer"
              kill -9 $INSTALLER_PID 2>/dev/null
              pkill -f "setup.exe" 2>/dev/null
              pkill -f "QuickSFV" 2>/dev/null
              break
            fi

            # Check installer exited
            if ! kill -0 $INSTALLER_PID 2>/dev/null; then
              echo "Installer exited."
              break
            fi

            # Show install size
            if [ -d /hf-drive/AV/installed ]; then
              echo "  [disk] installed = $(du -sh /hf-drive/AV/installed 2>/dev/null | cut -f1)"
            fi

            # Show log
            if [ -f /hf-drive/AV/install.log ]; then
              tail -1 /hf-drive/AV/install.log 2>/dev/null
            fi
          done

          echo "=== Install step complete ==="
          ls -lh /hf-drive/AV/installed/ 2>/dev/null | head -20

      - name: Zip installed game
        run: |
          echo "=== Zipping ==="
          tar -czf /hf-drive/AV/AV.Director.Life.tar.gz -C /hf-drive/AV/installed .
          ls -lh /hf-drive/AV/AV.Director.Life.tar.gz

      - name: Upload to bzzhr.co
        run: |
          FILE="/hf-drive/AV/AV.Director.Life.tar.gz"
          SIZE=$(ls -lh "$FILE" | awk '{print $5}')
          echo "=== Uploading $SIZE ==="
          curl -T "$FILE" "https://w.bzzhr.co/AV.Director.Life.tar.gz"

      - name: Cleanup
        if: always()
        run: |
          pkill -f wine 2>/dev/null || true
          pkill -f hf-mount-nfs 2>/dev/null || true
          rm -rf /tmp/wineprefix ~/wine-ge
